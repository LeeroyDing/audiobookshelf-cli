name: Release

on:
  push:
    tags:
      - "v*"

env:
  BIN_NAME: audiobookshelf-cli
  PROJECT_NAME: audiobookshelf-cli

jobs:
  build-and-release:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: audiobookshelf-cli-linux-x86_64
            asset_name: audiobookshelf-cli-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: audiobookshelf-cli-macos-x86_64
            asset_name: audiobookshelf-cli-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: audiobookshelf-cli-macos-aarch64
            asset_name: audiobookshelf-cli-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: audiobookshelf-cli-windows-x86_64
            asset_name: audiobookshelf-cli-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/${{ env.BIN_NAME }} ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: move target\${{ matrix.target }}\release\${{ env.BIN_NAME }}.exe ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
